{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2 class="card-title">个人中心</h2>

    {% if user %}
        <div class="user-info">
            <table class="info-table">
                <tr>
                    <td class="info-label">ID</td>
                    <td class="info-value">{{ user.id }}</td>
                </tr>
                <tr>
                    <td class="info-label">用户名</td>
                    <td class="info-value">{{ user.username }}</td>
                </tr>
                <tr>
                    <td class="info-label">邮箱</td>
                    <td class="info-value">{{ user.email }}</td>
                </tr>
                <tr>
                    <td class="info-label">手机</td>
                    <td class="info-value">{{ user.phone }}</td>
                </tr>
                <tr>
                    <td class="info-label">余额</td>
                    <td class="info-value">¥{{ user.balance }}</td>
                </tr>
            </table>
        </div>

        <div class="card recharge-card">
            <h3 class="card-title">充值</h3>
            <form method="POST" action="/recharge" class="login-form">
                <input type="hidden" name="user_id" value="{{ user.id }}">
                <div class="form-group">
                    <label for="amount">充值金额</label>
                    <input type="number" id="amount" name="amount" placeholder="请输入充值金额" step="0.01" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">立即充值</button>
            </form>
        </div>
    {% else %}
        <p class="card-text">未找到用户信息。</p>
        <div class="action-bar">
            <a href="/" class="btn btn-primary">返回首页</a>
        </div>
    {% endif %}
</div>
{% endblock %}
