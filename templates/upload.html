{% extends "base.html" %}
{% block content %}
<div class="card login-card">
    <h2 class="card-title">上传头像</h2>

    {% if error %}
        <div class="error-message">{{ error }}</div>
    {% endif %}

    {% if success %}
        <div class="success-message">上传成功！</div>
        <div class="upload-preview">
            <img src="{{ file_url }}" alt="{{ filename }}" class="preview-image">
            <p class="preview-link">文件链接：<a href="{{ file_url }}" target="_blank">{{ file_url }}</a></p>
        </div>
    {% endif %}

    <form method="POST" action="/upload" enctype="multipart/form-data" class="login-form">
        <div class="form-group">
            <label for="file">选择文件</label>
            <input type="file" id="file" name="file" class="file-input" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">上传</button>
    </form>
</div>
{% endblock %}
